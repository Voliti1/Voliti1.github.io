<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이상치 수정 내역</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.15);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 30px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.06) 0%, transparent 40%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa 0%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .meta-part {
            font-size: 14px;
            color: var(--text-muted);
        }

        .meta-part strong {
            color: #22d3ee;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
        }

        .count-badge {
            background-color: var(--primary-glow);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #a78bfa;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: rgba(15, 23, 42, 0.6);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 13px;
            padding: 12px 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 12px 15px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        /* 2행으로 나뉜 테이블 구조에 맞춰 보더 스타일 미세 조정 */
        tr.item-row-top td {
            padding-bottom: 6px;
        }

        tr.item-row-bottom td {
            padding-top: 6px;
        }

        .row-num {
            font-weight: 600;
            color: var(--text-muted);
        }

        .char-val {
            font-weight: 500;
            color: #38bdf8;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-upper {
            background-color: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171;
        }

        .badge-lower {
            background-color: rgba(245, 158, 11, 0.12);
            border: 1px solid rgba(245, 158, 11, 0.25);
            color: #fbbf24;
        }

        .num-val {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 600;
        }

        .original-val {
            color: #f87171;
            opacity: 0.9;
        }

        .corrected-val {
            color: #4ade80;
        }

        .arrow {
            color: var(--text-muted);
        }

        .no-data {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-muted);
        }

        .no-data-icon {
            font-size: 40px;
            margin-bottom: 15px;
            color: var(--text-muted);
            opacity: 0.4;
        }

        .no-data-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .no-data-desc {
            font-size: 13px;
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>이상치 수치 수정 내역</h1>
                <div class="meta-part">대상 품번: <strong id="part-number-display">품번 로딩중...</strong></div>
            </div>
            <div class="count-badge" id="count-badge-display">수정된 항목: 0개</div>
        </header>

        <main class="table-card" id="main-content-display">
            <!-- Will be rendered dynamically via Javascript -->
        </main>
    </div>

    <script>
        // Extract ID from query string
        const urlParams = new URLSearchParams(window.location.search);
        const entryId = urlParams.get('id');
        
        // Load history from localStorage
        const historyList = JSON.parse(localStorage.getItem('adms_history') || '[]');
        const entry = historyList.find(item => item.id === entryId);
        
        if (entry) {
            document.getElementById('part-number-display').textContent = entry.part_number || 'N/A';
            const items = entry.corrected_items || [];
            document.getElementById('count-badge-display').textContent = `수정된 항목: ${items.length}개`;
            
            const mainContent = document.getElementById('main-content-display');
            if (items.length > 0) {
                let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th rowspan="2" style="vertical-align: middle;">행 번호</th>
                            <th rowspan="2" style="vertical-align: middle;">항목명</th>
                            <th rowspan="2" style="vertical-align: middle;">구분</th>
                            <th rowspan="2" style="vertical-align: middle;">기준값 (Nominal)</th>
                            <th rowspan="2" style="vertical-align: middle;">초과량</th>
                            <th rowspan="2" style="vertical-align: middle;">변화수치</th>
                            <th style="border-bottom: none; padding-bottom: 6px;">허용범위</th>
                        </tr>
                        <tr>
                            <th style="padding-top: 6px;">보정 전/후 (Actual)</th>
                        </tr>
                    </thead>
                    <tbody>
                `;
                
                items.forEach(item => {
                    const nominal = Number(item.nominal) || 0;
                    const lowerTol = Number(item.lower_tol) || 0;
                    const upperTol = Number(item.upper_tol) || 0;
                    const originalActual = Number(item.original_actual) || 0;
                    const correctedActual = Number(item.corrected_actual) || 0;
                    const excessVal = Number(item.excess_val) || 0;
                    const correctionVal = Number(item.correction_val) || 0;
                    
                    const badgeClass = item.type === '상한 초과' ? 'badge-upper' : 'badge-lower';
                    const excessText = excessVal ? excessVal.toFixed(4) : 'N/A';
                    const correctionText = correctionVal ? correctionVal.toFixed(4) : 'N/A';
                    
                    tableHtml += `
                        <tr class="item-row-top">
                            <td rowspan="2" class="row-num" style="vertical-align: middle;">${item.row}</td>
                            <td rowspan="2" class="char-val" style="vertical-align: middle;">${item.char_val}</td>
                            <td rowspan="2" style="vertical-align: middle;">
                                <span class="badge ${badgeClass}">${item.type}</span>
                            </td>
                            <td rowspan="2" class="num-val" style="vertical-align: middle;">${nominal.toFixed(4)}</td>
                            <td rowspan="2" class="num-val" style="color: var(--danger); vertical-align: middle;">${excessText}</td>
                            <td rowspan="2" class="num-val" style="color: var(--primary); vertical-align: middle;">${correctionText}</td>
                            <!-- 허용범위 (위쪽 행) -->
                            <td class="num-val" style="color: var(--text-muted); border-bottom: none; padding-bottom: 6px; white-space: nowrap;">
                                ${(nominal + lowerTol).toFixed(4)} ~ ${(nominal + upperTol).toFixed(4)}
                            </td>
                        </tr>
                        <tr class="item-row-bottom">
                            <!-- 보정 전/후 (아래쪽 행) -->
                            <td class="num-val" style="padding-top: 6px; border-bottom: 1px solid var(--border-color); white-space: nowrap;">
                                <span class="original-val num-val" style="color: var(--danger);">${originalActual.toFixed(4)}</span>
                                <span class="arrow" style="margin: 0 6px; color: var(--text-muted);">~</span>
                                <span class="corrected-val num-val" style="color: var(--success);">${correctedActual.toFixed(4)}</span>
                            </td>
                        </tr>
                    `;
                });
                
                tableHtml += `
                    </tbody>
                </table>
                `;
                mainContent.innerHTML = tableHtml;
            } else {
                renderNoData(mainContent);
            }
        } else {
            const mainContent = document.getElementById('main-content-display');
            renderNoData(mainContent);
            document.getElementById('part-number-display').textContent = '찾을 수 없음';
        }
        
        function renderNoData(container) {
            container.innerHTML = `
                <div class="no-data">
                    <div class="no-data-icon">📊</div>
                    <div class="no-data-title">이상치 수정 내역 없음</div>
                    <div class="no-data-desc">모든 데이터가 오차 허용 한계(Nominal + Tolerances) 이내에 존재합니다.</div>
                </div>
            `;
        }
    </script>
</body>
</html>
